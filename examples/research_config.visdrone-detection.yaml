# =============================================================================
# research_config.yaml — VisDrone small object detection
# -----------------------------------------------------------------------------
# Single source of configuration for the research pipeline.
# Every field below has an inline comment explaining what it does.
# Fields marked [required] must be set; [optional] can be left as default/null.
# =============================================================================

meta:
  config_version: "3.0"            # [required] Schema version. Bump when adding/removing fields.
  project_name: "visdrone-small-object"  # [required] Used in log lines, git commit messages, summary output.
  run_tag: null                    # [optional] Custom tag appended to git branch name. null = today's date auto-used.

# -----------------------------------------------------------------------------
# task — what you're trying to do
# -----------------------------------------------------------------------------
task:
  description: >                   # [required] Free-text task description. Paper finder uses this to build search queries.
    Detect small objects (pedestrians, vehicles, bicycles) in drone aerial
    imagery at 1920x1080, with heavy occlusion and long-tail class distribution.
  task_type: object_detection      # [required] Decides which template to scaffold. Options: object_detection / object_tracking
  framework: ultralytics-yolo      # [required] Framework family. Currently only ultralytics-yolo supported.
  # --- v1.7.5: user-specified base model (optional, skips paper-finder Phase 2-4) ---
  # preferred_base_model: YOLO26X              # [optional] If set with preferred_base_weights_url, paper finder writes base_model.md directly and skips scoring. Useful when model has no arXiv paper or scoring infrastructure (.env) is unavailable.
  # preferred_base_weights_url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo26x.pt
  # preferred_base_arxiv_id: 2305.09972        # [optional, optional] arXiv ID if known; omit otherwise
  domain: aerial_drone             # [optional] Hint for paper finder query generation. e.g. aerial_drone / medical / autonomous / satellite / general
  detection_targets:               # [optional] Class names being detected. Used in paper finder query generation.
    - pedestrian
    - vehicle
    - bicycle
  key_challenges:                  # [optional] Difficulties paper finder should target. e.g. small_objects / dense_scene / occlusion / camera_motion / id_switch
    - small_objects
    - dense_scene
    - occlusion
  reference_baselines:             # [optional] Models that the chosen base model must beat. Used in paper finder Phase 4 base model selection.
    - YOLOv8
    - YOLOv11
    - YOLOv26

# -----------------------------------------------------------------------------
# paths — where files live
# -----------------------------------------------------------------------------
paths:
  project_root: "."                # [required] Project working directory. v1.9.2+ uses this as absolute path
                                   # (resolved at Stage 0) for ALL file operations, defeating cross-project run.log
                                   # pollution when multiple ARAC projects coexist on the same machine. "." resolves
                                   # to wherever this yaml is read from. Use absolute path if you launch from elsewhere.
  skills_dir: "./skills"           # [required] Where the four skills + shared/ live. Relative to this yaml. Absolute paths also accepted.
  pipeline_state: "pipeline_state.json"  # [optional] Where orchestrator stores cross-stage state. Default ok.
  train_script: "train.py"         # [optional] The script autoresearch iterates on. Default ok.
  custom_modules_file: "custom_modules.py"  # [optional] Where autoresearch puts paper-extracted module classes.
  weights_dir: "weights"           # [optional] Where downloaded base model weights are cached.
  local_papers_dir: null           # [optional] Folder of manually downloaded PDFs for paper finder to scan. null = skip local PDF source.
  local_datasets_dir: null         # [optional] Folder of pre-converted YOLO datasets to merge into pretrain corpus. null = skip local dataset source.
  dataset_root: "/data/visdrone"   # [required] Path to your YOLO-format dataset (must contain images/ + labels/ + data.yaml).

# -----------------------------------------------------------------------------
# evaluation — how to measure model quality
# -----------------------------------------------------------------------------
evaluation:
  tool: ultralytics_val            # [required] Evaluation backend. Options: ultralytics_val / trackeval / pycocotools / custom_script

  ultralytics_val:                 # [required if tool=ultralytics_val] Settings passed to ultralytics model.val().
    split: val                     # Which dataset split to evaluate on. val / test
    imgsz: 1920                    # Inference image size. Locked across runs — orchestrator copies this to train.py's IMGSZ.
    batch: 8                       # Eval batch size. Lower if OOM during val.
    conf: 0.001                    # Confidence threshold for predictions during eval. Standard COCO value.
    iou: 0.6                       # IoU threshold for NMS. Standard YOLO value.

  metrics:                         # [required] Defines what autoresearch keeps/discards on, and what's tracked in results.tsv.
    primary: val_mAP50_95          # The metric autoresearch optimizes. Must have a parsing pattern below.
    tiebreak: val_mAP50            # When primary changes by less than min_improvement, this is the tie-breaker.
    secondary: [val_precision, val_recall]  # Tracked in results.tsv but doesn't affect keep/discard.
    guard:                         # Metrics that, if they degrade beyond tolerance, force discard regardless of primary.
      num_params_M: 5              # Param count must not grow > 5%. Prevents bloated models that win mAP by adding 50M params.
    min_improvement: 0.001         # Primary must improve by at least this much (absolute) to be kept.
    # minimize: []                 # [optional] Metrics where smaller is better (e.g. IDSW for tracking). Default empty.

  parsing:                         # [required] How to extract metrics from train.py's stdout.
    source: stdout                 # Where metrics live. Options: stdout / json / csv
    patterns:                      # Regex per metric. First capture group is the value. Must include all metrics referenced above.
      val_precision: 'val_precision:\s+([\d.]+)'
      val_recall:    'val_recall:\s+([\d.]+)'
      val_mAP50:     'val_mAP50:\s+([\d.]+)'
      val_mAP50_95:  'val_mAP50_95:\s+([\d.]+)'
      num_params_M:  'Model Summary:.*?([\d.]+)M params'

# -----------------------------------------------------------------------------
# paper_finder — how to find base model + improvement modules
# -----------------------------------------------------------------------------
paper_finder:
  mode: initial                    # [optional] Always initial on first run. Orchestrator overrides to "expand" when autoresearch stalls.
  sources:                         # [optional] Which paper sources to query. Disable any you don't have access to.
    arxiv: true                    # arXiv API (no key required)
    papers_with_code: true         # Papers with Code API (no key required)
    semantic_scholar: true         # Semantic Scholar Graph API (no key required, but rate-limited)
    local_pdfs: true               # Scan paths.local_papers_dir if set
  search_queries:                  # [required] Seed queries for paper search. Be specific — vague queries return noise.
    - "small object detection UAV YOLO"
    - "drone aerial object detection transformer"
    - "feature pyramid small object"
  scoring_weights:                 # [optional] Relative importance of paper ranking criteria. Must sum to 100.
    task_relevance: 40             # Does the abstract mention the same domain/challenge?
    recency: 20                    # Newer papers score higher (cutoff in recency_cutoff_year below).
    has_official_code: 20          # Has a public repo (paper2code can use it)?
    benchmark_result: 20           # Reports results on benchmark_datasets below?
  recency_cutoff_year: 2022        # [optional] Papers older than this year score 0 on recency.
  benchmark_datasets:              # [optional] Boost papers that report on these benchmarks.
    - VisDrone
    - COCO
    - DOTA
  top_n_papers: 20                 # [optional] Keep top N after scoring. Higher = more module candidates, slower.
  pdf_max_pages: 12                # [optional] Local PDF reader page limit. Abstract+intro+method usually fit in 12 pages.
  min_repo_stars: 10               # [optional] GitHub repos with fewer stars are ignored when looking for `paper2code: yes (GitHub repo available)`.
  base_model:                      # [optional] Constraints on the base model paper finder picks.
    require_weights_or_reconstruct: true   # Either downloadable weights or reconstructable via paper2code; otherwise reject.
    allow_paper2code_reconstruct: true     # If only paper exists (no weights), reconstruct from arXiv via paper2code.
  modules:                         # [optional] Constraints on improvement modules paper finder writes to modules.md.
    max_complexity: high           # Skip modules harder than this. Options: low / medium / high
    preferred_locations:           # [v1.7.3] Paper-finder filters search to these locations; autoresearch also uses this as secondary sort key within each complexity tier. For tracking add: tracker / post_processing
      - backbone
      - neck
      - head
      - loss
    max_pending_in_md: 20          # Cap on pending modules in modules.md. Above this, paper finder skips its search and reports.

# -----------------------------------------------------------------------------
# dataset_hunter — public dataset search + pretrain corpus
# -----------------------------------------------------------------------------
dataset_hunter:
  enabled: true                    # [required] Set to false to skip Stage 2 entirely.
                                   # C10: When false, pretrain is never run, never auto-triggered mid-loop,
                                   # and autoresearch starts from the base model weights directly.
                                   # Stage 2 short-circuits; pipeline_state.stage advances to "autoresearch".
  sources:                         # [optional] Which dataset sources to query. Disable any you don't have access to.
    local: true                    # Scan paths.local_datasets_dir if set
    huggingface: true              # HuggingFace Datasets, tag=object-detection
    roboflow: false                # Roboflow Universe (requires API key)
    coco: true                     # Direct COCO 2017 download
    openimages: true               # OpenImages v7 via openimages CLI
    papers_with_code: true         # Datasets listed on papers_with_code with direct download URLs
  # credentials:
  # API keys are NOT stored in this yaml (it may be committed to git).
  # Put them in a `.env` file in the project root instead:
  #
  #   ROBOFLOW_API_KEY=...          # Free at roboflow.com. Required if sources.roboflow=true.
  #   HF_TOKEN=hf_...               # Required only for gated HF datasets.
  #   FIRECRAWL_API_KEY=fc-...      # Enables deep scrape of PwC pages. Free 500 credits/month.
  #
  # Orchestrator loads .env at Stage 0 Step 1.5. Skills read via os.environ.get().
  disk:                            # [required] Disk space management.
    budget_gb: 100                 # Hard limit on download size. Dataset hunter checks remaining before each download.
    output_dir: "pretrain_data"    # Where downloads land. Subdirs: raw/ converted/ merged/.
  openimages_max_samples: 50000    # [optional] Cap OpenImages download size. Full dataset is ~1.5TB — usually want a subset.
  val_split_ratio: 0.1             # [optional] When a dataset has no val split, reserve this fraction (deterministic by filename hash).
  pretrain:                        # [required] Pretrain settings.
    time_budget_sec: 21600         # How long pretrain may run. Default 21600 = 6 hours. v1.7.5: set to 0 to skip pretrain entirely (dataset search still runs; use dataset_hunter.enabled: false to skip search too).
    eval_time_budget_sec: 1800     # How long each self-eval finetune may run (one for baseline, one for pretrained). Default 1800 = 30 min each.
    improvement_threshold: 0.002   # Pretrained must beat baseline by this much (absolute) to recommend use_pretrained.
    skip_if_corpus_empty: true     # If all downloads failed and corpus is empty, skip pretrain rather than crash.
    batch_size: null               # null = inherit from train.py. Override only if pretrain OOMs.
    # eval_metric: val_mAP50_95    # [optional] Metric used for pretrain self-eval. Default val_mAP50_95 — independent of evaluation.metrics.primary.

# -----------------------------------------------------------------------------
# autoresearch — the experiment loop
# -----------------------------------------------------------------------------
autoresearch:
  loop:                            # [required] Per-iteration settings.
    time_budget_sec: 1200          # Wall-clock per experiment. Locked across runs to keep results comparable. Default 1200 = 20 min.
    max_runtime_multiplier: 2      # If a run exceeds time_budget_sec * this, kill it as crashed. Default 2.
    iterations: null               # null = loop forever until interrupted. Set integer for bounded run.
    seed: 42                       # Random seed. Locked across runs for reproducibility.
    batch_size: 16                 # [v1.12+] LOCKED BATCH_SIZE for train.py. invariants.LOCKED_VARS
                                   # enforces this — same semantics as IMGSZ / SEED / TIME_BUDGET.
                                   # Once set, it cannot drift across iterations. autoresearch will
                                   # NOT halve dynamically; modules predicted to OOM are marked
                                   # DISCARD + blocked. Choose conservatively: pick a value with
                                   # ~20GB headroom on baseline so resource-heavy modules can still
                                   # run. H100 80GB users at IMGSZ=1920 try 32; at IMGSZ=640 try 32
                                   # (Loop 0 of session 2026-04-27 showed BATCH=64 used 78.35GB / 80GB,
                                   # leaving 1.65GB — anything memory-heavy OOMs).
                                   #
                                   # Backward compat: pre-v1.12 yaml `initial_batch_size: N` still
                                   # works if `batch_size:` is absent. State init prefers `batch_size`
                                   # over `initial_batch_size` when both exist. New runs should write
                                   # `batch_size` only.
  optimizer: SGD                   # [v1.7.7] Initial optimizer for train.py. Permitted: SGD/AdamW/Adam/RMSProp/NAdam/RAdam. Cannot be 'auto' (silently overrides LR0/MOMENTUM). autoresearch may swap during experiments but never to 'auto'.
  stall:                           # [optional] When to escalate after no-improvement streaks.
    threshold: 10                  # Consecutive non-improving rounds before triggering paper_finder expand.
    force_test_reset: 5            # When stall hits threshold AND modules.md has pending entries,
                                   # reset stall_count to this so the pipeline force-tests a pending
                                   # module next iteration. Set equal to threshold to disable force-test.
  module_priority:                 # [optional, v1.9.1+] Order autoresearch picks experiment types. Lower index = tried first.
                                   # Tokens omitted from this list are SKIPPED ENTIRELY (not just deprioritized).
                                   # Default order if unset: A → B → C → D → E (the order shown below).
                                   # Common configurations:
                                   #   [modules_md_pending]                               — architecture-only run
                                   #   [zero_param_changes]                               — hyperparameter-sweep-only run
                                   #   [modules_md_pending, combinations]                 — paper-backed + combine wins, no manual tuning
                                   #   [zero_param_changes, modules_md_pending]           — try hyperparams first, fall back to modules
                                   # Invalid tokens / non-list values fall back to default with a discoveries.md warning.
    - modules_md_pending           # A: paper-backed modules from modules.md
    - zero_param_changes           # B: hyperparameters, LR, augmentation (no param count change)
    - replacement_changes          # C: swap one block for another of similar size
    - additive_changes             # D: add new block (param count grows)
    - combinations                 # E: combine 2-3 previously-kept changes

# -----------------------------------------------------------------------------
# orchestrator — pipeline-level control
# -----------------------------------------------------------------------------
orchestrator:
  auto_advance: true               # [required] Move between stages without asking. Setting false defeats the autonomous design.
  resume_from_state: true          # [required] On restart, read pipeline_state.json and resume from the recorded stage.
  optional_pretrain_trigger:       # [optional, IMPLEMENTED in v1.12.1] Auto-trigger mid-run pretrain when
                                   # autoresearch stalls. v1.7-v1.12 had this in yaml docs but no actual
                                   # evaluation code; v1.12.1 wires it up. Default disabled — explicit
                                   # opt-in required. Requires dataset-hunter to have run AND
                                   # produced a corpus (state.pretrain_done == true), otherwise the
                                   # trigger logs a warning and self-disables for the rest of the run.
    enabled: false                 # v1.12.1 default: false. Set true ONLY if your pipeline ran
                                   # dataset-hunter and has a corpus available for re-pretrain. With
                                   # dataset_hunter.enabled: false, this trigger has nothing to invoke
                                   # and will warn-and-disable on first attempt.
    min_autoresearch_loops: 5      # Don't even consider firing before this many loops have run. Avoids
                                   # spurious early triggers when the first few modules are paper-finder's
                                   # initial low-priority candidates.
    stalled_loops_required: 5      # Fire after this many consecutive no-improvement loops AND
                                   # min_autoresearch_loops met. Both gates must clear (AND, not OR).
                                   # Sets state.request_repretrain=true; Step 6.5 picks it up next iter.
  error_policy:                    # [optional] How to handle expected failures.
    paper_finder_retries: 1        # Retry paper finder this many times before falling back to default base model.
    autoresearch_crash_pause_after: 3  # [v1.12+] After N consecutive crashes, log to discoveries.md
                                   # and reset the crash counter. v1.12 NO LONGER halves BATCH_SIZE
                                   # or reverts commits — BATCH_SIZE is locked. User intervenes manually
                                   # if 3+ consecutive crashes happen. Set to a very large number to
                                   # effectively disable. (A3/C8.)
  stopping:                        # [optional] Autonomous Stage 4 triggers. Unattended runs need at least one
                                   # of these configured, otherwise the loop runs forever.
    stop_flag_file: "stop_pipeline.flag"   # If this file appears in the project root, orchestrator
                                           # enters Stage 4 after the current loop iteration. Lets external
                                           # schedulers (cron, systemd timer) request a clean shutdown.
    max_paper_finder_expansions: 3 # After this many expansions with no new pending modules, stop —
                                   # further expansion is not finding new ideas.
    # v1.8 — autonomous convergence triggers (all optional; commented = no limit).
    # max_no_improvement_loops: 10  # Stop if N consecutive iterations all discard. Detects convergence
    #                                # for unattended runs. Counter resets on every keep.
    # max_total_loops: 100           # Hard ceiling on total iterations regardless of convergence state.
    #                                # Distinct from autoresearch.loop.iterations (which is the user's
    #                                # bounded-run intent); this is the safety brake for `iterations: null`.
    # max_wallclock_hours: 72        # Stop after N hours of wallclock since pipeline start. Useful for
    #                                # batch jobs with hard deadlines.
    # Also honours autoresearch.loop.iterations if set (bounded run terminates naturally).
  git:                             # [optional] Git automation.
    auto_init: true                # Run `git init` if project isn't a repo. Required for autoresearch's commit/revert flow.
    branch_prefix: "autoresearch/" # All experiment commits go on a branch named <prefix><run_tag>.
  concurrent_paper_finder:         # [optional, v1.11+] Run paper-finder Phase 5-6 in parallel with Loop 0 vanilla baseline.
                                   # Saves ~2h wallclock per pipeline startup. Defaults to enabled (aggressive).
    enabled: true                  # Set false to fall back to v1.10 sequential behaviour (paper-finder runs before Loop 0).
    timeout_after_baseline_min: 30 # If subagent hasn't written paper_finder.done within N minutes after baseline completes,
                                   # kill it and fall back to sequential paper-finder. 30 = 1.5× typical paper-finder runtime.
    fallback_on_failure: true      # If subagent crashes before completing, run paper-finder sequentially instead of failing.
                                   # Set false only if you want pipeline to halt on subagent failure (debug mode).
    subagent_type: "general-purpose"  # [v1.11.1+] Task() subagent_type. "general-purpose" handles paper-finder's mix of
                                      # web search + parsing + file I/O. Other valid values depend on your environment
                                      # (Claude Code: "Explore" / "Plan" / custom subagents). Don't use "Explore" — it's
                                      # codebase-search-optimised, wrong fit for paper search.
    subagent_model: null              # [v1.11.1+] Model for the spawned subagent. null = inherit from main agent (default).
                                      # Override with "haiku" / "sonnet" / "opus" / a model ID. Cost trade-off:
                                      #   • haiku  ~$0.25/run — cheaper, may miss paper detail nuances
                                      #   • sonnet ~$0.75/run — current default behaviour, balanced
                                      #   • opus   ~$3.75/run — most thorough, overkill for routine paper-finder runs
                                      # If your main agent runs on Sonnet and you set null, subagent gets Sonnet.

# -----------------------------------------------------------------------------
# advanced — output filenames, rarely changed
# -----------------------------------------------------------------------------
advanced:
  results_tsv: "results.tsv"       # [optional] One row per experiment loop. Header is dynamic based on evaluation.metrics.
  hunt_log_tsv: "hunt_log.tsv"     # [optional] Dataset hunter download log. Internal — not read by other skills.
  modules_md: "modules.md"         # [optional] Module registry written by paper finder, consumed by autoresearch.
  base_model_md: "base_model.md"   # [optional] Base model selection written by paper finder.
  pretrain_ckpt_dir: "pretrain_ckpt"  # [optional] Where pretrain.py writes checkpoints.
